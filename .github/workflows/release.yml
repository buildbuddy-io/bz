name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            artifact: bz-linux-x86_64
          - runner: ubuntu-24.04-arm
            artifact: bz-linux-arm64
          - runner: macos-15-intel
            artifact: bz-macos-x86_64
          - runner: macos-15
            artifact: bz-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          output="dist/${{ matrix.artifact }}"
          bazel build //app/bz:bz -c opt
          binary="$(bazel cquery //app/bz:bz -c opt --output=files 2>/dev/null | tail -n 1)"
          cp "$binary" "$output"
          chmod +x "$output"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release artifacts
        shell: bash
        run: ls -l dist

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
